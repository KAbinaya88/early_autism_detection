<!DOCTYPE html>
<html>
<head>
    <title>ASD Annotator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <style>
        nav {
            background-color: #f2f2f2;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        .container {
            width: 80%;
            margin: auto;
        }
    </style>
    <nav>
        <a href="/">Home</a>
        {% if current_user.is_authenticated %}
            <a href="/logout">Logout</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
