{% extends "base.html" %}
{% block content %}

<h2>Your Videos</h2>

<style>
    form {
        display: flex;
        flex-direction: column;
        width: 300px;
        margin: auto;
        align-items: center;
        justify-content: center;
        height: 150px;
    }
    input {
        margin-bottom: 10px;
        padding: 8px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
    }
    button {
        padding: 8px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
    }
</style>

<form method="POST" action="/upload" enctype="multipart/form-data">
    <input type="file" name="video">
    <button type="submit">Upload</button>
</form>

<hr>

{% for v in videos %}
    <div>
        <b>{{ v.filename }}</b>  
        <a href="/annotate/{{ v.video_id }}">Annotate</a>
    </div>
    <br>
{% endfor %}

{% endblock %}
